name: Publish to npm

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm build
        env:
          CONTXT_SUPABASE_URL: ${{ secrets.CONTXT_SUPABASE_URL }}
          CONTXT_SUPABASE_ANON_KEY: ${{ secrets.CONTXT_SUPABASE_ANON_KEY }}

      - name: Publish @mycontxt/core
        run: pnpm publish --no-git-checks --access public
        working-directory: packages/core
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @mycontxt/adapters
        run: pnpm publish --no-git-checks --access public
        working-directory: packages/adapters
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @mycontxt/cli
        run: pnpm publish --no-git-checks --access public
        working-directory: packages/cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
